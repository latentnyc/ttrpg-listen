# TTRPGListen Configuration
# Copy to config.yaml and adjust as needed.

audio:
  # Device IDs - use `ttrpglisten --list-devices` to find yours
  # null = auto-detect
  loopback_device: null   # WASAPI loopback for remote players' audio
  mic_device: null        # Your microphone
  sample_rate: 16000

streaming:
  # Model for live captions (smaller = faster, lower latency)
  # Options: usefulsensors/moonshine-streaming-tiny (fastest, lower accuracy)
  #          usefulsensors/moonshine-streaming-small (default, good balance)
  #          usefulsensors/moonshine-streaming-medium (best quality, slower)
  model: "usefulsensors/moonshine-streaming-small"
  device: "auto"   # auto, cpu, cuda, mps
  language: "en"

postprocess:
  # Model for final transcript (Whisper Turbo for best accuracy)
  # Options: openai/whisper-large-v3-turbo (recommended)
  #          usefulsensors/moonshine-streaming-medium (lighter, no GPU needed)
  model: "openai/whisper-large-v3-turbo"
  language: "en"
  diarization: true       # Requires: pip install pyannote-audio
  min_speakers: 2
  max_speakers: 8

vad:
  threshold: 0.5
  min_silence_duration_ms: 600
  speech_pad_ms: 200
  min_speech_duration_ms: 250
  max_speech_duration_s: 10.0

output:
  directory: "./transcripts"
